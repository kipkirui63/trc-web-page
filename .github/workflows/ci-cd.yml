name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, dom, fileinfo, mysql, sqlite
          coverage: none

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Build frontend assets
        run: npm run build

      - name: Run tests
        run: composer test

      - name: Prepare production dependencies
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --no-progress

      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: trc-agc-web-build
          path: |
            app
            bootstrap
            config
            database
            public
            resources
            routes
            storage
            vendor
            artisan
            composer.json
            composer.lock
            package.json
            package-lock.json
            vite.config.js
          if-no-files-found: error

      - name: Install SSH key
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CPANEL_SSH_KEY }}

      - name: Trust cPanel host
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.CPANEL_PORT || 22 }}" "${{ secrets.CPANEL_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy application files
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='node_modules' \
            --exclude='public_html' \
            --exclude='tests' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/data/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            -e "ssh -p ${{ secrets.CPANEL_PORT || 22 }}" \
            ./ "${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}:/home/${{ secrets.CPANEL_USER }}/repositories/trc-web-page/"

      - name: Deploy public web root
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          rsync -az --delete \
            --exclude='index.php' \
            --exclude='.well-known' \
            --exclude='cgi-bin' \
            -e "ssh -p ${{ secrets.CPANEL_PORT || 22 }}" \
            public/ "${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}:/home/${{ secrets.CPANEL_USER }}/public_html/"
          rsync -az \
            -e "ssh -p ${{ secrets.CPANEL_PORT || 22 }}" \
            public_html/ "${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}:/home/${{ secrets.CPANEL_USER }}/public_html/"

      - name: Finish Laravel deployment
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          ssh -p "${{ secrets.CPANEL_PORT || 22 }}" "${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}" <<'EOF'
          cd ~/repositories/trc-web-page
          mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs bootstrap/cache
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          EOF
