name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, dom, fileinfo, mysql, sqlite
          coverage: none

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Build frontend assets
        run: npm run build

      - name: Run tests
        run: composer test

      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: trc-agc-web-build
          path: |
            app
            bootstrap
            config
            database
            public
            resources
            routes
            storage
            vendor
            artisan
            composer.json
            composer.lock
            package.json
            package-lock.json
            vite.config.js
          if-no-files-found: error
